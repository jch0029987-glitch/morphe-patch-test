name: Build Morphe Patch

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to run it manually from GitHub

permissions:
  contents: read
  packages: read  # Required to download the Morphe Gradle Plugin

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        env:
          # These map the secure GitHub tokens to the variables our script needs
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew buildAndroid --stacktrace

      - name: Upload Patch Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JeremyPatch-MPP
          path: app/build/outputs/morphe/*.mpp
